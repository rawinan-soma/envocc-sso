# gitleaks configuration for envocc-sso
# https://github.com/gitleaks/gitleaks
#
# Uses the gitleaks default ruleset as a base, with additional rules
# and allowlists specific to this project's Keycloak + Rails stack.
#
# Usage:
#   gitleaks detect --source . --redact           # scan working tree (CI)
#   gitleaks protect --staged --redact            # scan staged files (pre-commit)
#   gitleaks detect --source keycloak/realm-export.json --verbose  # spot-check
#
# IMPORTANT: gitleaks compiles regexes with Go's RE2 engine, which does NOT
# support lookaround (?!...) / (?=...). Placeholder values are therefore
# excluded via per-rule [rules.allowlist] regexes, never via negative lookahead.

title = "envocc-sso gitleaks config"

# ─── Extend the default ruleset ─────────────────────────────────────────────
[extend]
# Pull in gitleaks' built-in rules (covers AWS, GCP, GitHub tokens, JWTs, etc.)
useDefault = true

# ─── Custom rules ─────────────────────────────────────────────────────────────
# Each rule matches the assignment of an 8+ char value to a known secret var,
# then excludes the project's placeholder tokens via a per-rule allowlist.

# Shared placeholder/reference exclusions for the env-var password rules.
# - placeholder tokens (change-me, etc.) are dev defaults, not secrets
# - ${VAR} / $VAR are compose interpolation references, not literal secrets
# - "realpass" is the documented example value in the AC1-RC-13 test fixture

[[rules]]
id          = "keycloak-admin-password"
description = "Keycloak admin password with a real value"
# Character class excludes $, {, ? to avoid false-positives on Bash parameter
# expansion syntax such as ${VAR:?VAR must be set} or ${VAR:-default}.
regex       = '''(?i)(KEYCLOAK_ADMIN_PASSWORD|KC_BOOTSTRAP_ADMIN_PASSWORD)\s*[:=]\s*["']?[^\s"'${}?]{8,}'''
tags        = ["keycloak", "password"]
[rules.allowlist]
# regexTarget = "match" tests the regex against the full matched string
# (e.g. "KEYCLOAK_ADMIN_PASSWORD=change-me"), so we anchor each pattern with
# word-boundary equivalents to avoid "change-meNow" or "change-me123" matching.
regexTarget = "match"
regexes     = ['''(?i)(^|[-_=:"'\s])(change[-_]me|changeit|placeholder|test-only|your[-_.]password)($|[-_=:"'\s])''']

[[rules]]
id          = "keycloak-db-password"
description = "Keycloak DB password with a real value"
# Character class excludes $, {, ? to avoid false-positives on Bash parameter
# expansion syntax such as ${VAR:?VAR must be set} (used in init scripts for
# fail-fast required-env-var checks). These are env-var references, not secrets.
regex       = '''(?i)(KEYCLOAK_DB_PASSWORD|KC_DB_PASSWORD)\s*[:=]\s*["']?[^\s"'${}?]{8,}'''
tags        = ["keycloak", "database", "password"]
[rules.allowlist]
regexTarget = "match"
regexes     = [
  # Placeholder/dev-default values
  '''(?i)(^|[-_=:"'\s])(change[-_]me|changeit|placeholder|test-only|your[-_.]password)($|[-_=:"'\s])''',
  # Bash parameter-expansion guards: ${VAR:?error message} — the `:?` operator
  # causes a false positive because `:` matches `[:=]` and `?VAR_NAME` satisfies
  # `[^\s"'$]{8,}`.  This pattern detects the bash expansion colon-question mark.
  '''(?i)(KEYCLOAK_DB_PASSWORD|KC_DB_PASSWORD):[?]''',
]

[[rules]]
id          = "rails-db-password"
description = "Rails database password with a real value"
# Character class excludes $, {, ? to avoid false-positives on Bash parameter
# expansion syntax such as ${VAR:?VAR must be set}.
regex       = '''(?i)RAILS_DB_PASSWORD\s*[:=]\s*["']?[^\s"'${}?]{8,}'''
tags        = ["rails", "database", "password"]
[rules.allowlist]
regexTarget = "match"
regexes     = ['''(?i)(^|[-_=:"'\s])(change[-_]me|changeit|placeholder|test-only|your[-_.]password)($|[-_=:"'\s])''']

[[rules]]
id          = "postgres-password"
description = "PostgreSQL password with a real value"
# Character class excludes $, {, ? to avoid false-positives on Bash parameter
# expansion syntax such as ${VAR:?VAR must be set}.
regex       = '''(?i)POSTGRES_PASSWORD\s*[:=]\s*["']?[^\s"'${}?]{8,}'''
tags        = ["postgres", "password"]
[rules.allowlist]
regexTarget = "match"
regexes     = ['''(?i)(^|[-_=:"'\s])(change[-_]me|changeit|placeholder|test-only|your[-_.]password)($|[-_=:"'\s])''']

[[rules]]
id          = "adminapp-db-password"
description = "Admin app DB password with a real value"
# Character class excludes $, {, ? to avoid false-positives on Bash parameter
# expansion syntax such as ${VAR:?VAR must be set}.
regex       = '''(?i)ADMINAPP_DB_PASSWORD\s*[:=]\s*["']?[^\s"'${}?]{8,}'''
tags        = ["adminapp", "database", "password"]
[rules.allowlist]
regexTarget = "match"
regexes     = ['''(?i)(^|[-_=:"'\s])(change[-_]me|changeit|placeholder|test-only|your[-_.]password)($|[-_=:"'\s])''']

[[rules]]
id          = "keycloak-client-secret"
description = "Keycloak client secret with a real value (non-empty)"
# Matches the realm-export "secret":"<value>" and "clientSecret":"<value>" forms.
# Floor is 8 chars (not 16) to catch short manually-set secrets; Keycloak's
# auto-generated secrets are 32+ chars but operators can set shorter values.
regex       = '''"(clientSecret|secret)"\s*:\s*"[^"]{8,}"'''
tags        = ["keycloak", "client-secret"]
[rules.allowlist]
regexTarget = "match"
regexes     = ['''(?i)(change[-_]me|placeholder|test-only)''']

[[rules]]
id          = "keycloak-private-key"
description = "Keycloak RSA private key embedded in realm export or config"
# Catches BOTH the string form "privateKey":"<64+>" AND the realm-export array
# form "privateKey":["<64+>"] that Keycloak actually emits for KeyProvider config.
regex       = '''"(privateKey|certificate)"\s*:\s*\[?\s*"[^"]{64,}"'''
tags        = ["keycloak", "private-key"]

[[rules]]
id          = "keycloak-hmac-secret"
description = "Keycloak HMAC/AES secret in key provider config (non-empty)"
# Array form: "secret":["<16+ chars>"]
regex       = '''"secret"\s*:\s*\[\s*"[^"]{16,}"\s*\]'''
tags        = ["keycloak", "hmac-secret"]

[[rules]]
id          = "rails-master-key"
description = "Rails credentials master key (assigned form)"
# Matches the prefixed/assigned form (master.key=<hex> / RAILS_MASTER_KEY=<hex>).
# A *bare* 32-hex config/master.key file is guarded by .gitignore (a bare-hex
# regex here would false-positive on git SHAs, realm IDs, etc.) — defence in
# depth: .gitignore blocks the file, this rule blocks the env-var/assignment form.
regex       = '''(?i)(master\.key|RAILS_MASTER_KEY)\s*[:=]\s*["']?[0-9a-f]{32}'''
tags        = ["rails", "master-key"]

# ─── Allowlist ────────────────────────────────────────────────────────────────
[allowlist]
description = "Known-safe patterns: placeholders, examples, test fixtures"
# regexTarget = "match" ensures regexes below are tested against just the
# captured secret value (e.g. "change-me"), not the entire source line.
# Without this, anchored patterns like ^change[-_]me$ never fire because the
# full line (e.g. KC_DB_PASSWORD=change-me) doesn't match the anchored form.
regexTarget = "match"

# Global value allowlist — kept deliberately NARROW and ANCHORED so a real
# weak secret (e.g. "change-meNOW123") is NOT masked. Only exact placeholder
# tokens are allowed here.
#
# NOTE: Empty-field safety for realm exports (empty "secret"/"privateKey" etc.)
# comes from the per-rule minimum-length anchors ({8,}, {16,}, {64,}) which
# exclude empty strings by design — NOT from global allowlist patterns.
# JSON structural patterns like '"secret":\[""\]' were removed because they
# cannot match under regexTarget = "match" (which tests only the bare captured
# value, not the surrounding JSON context).
regexes = [
  # Explicit placeholders (anchored to the whole matched value)
  '''^change[-_]me$''',
  '''^CHANGE[-_]ME$''',
  '''^placeholder[-_]?replaced[-_]?by[-_]?env$''',
  '''^placeholder$''',
  '''^test-only-not-real$''',
]

# Files/dirs that are explicitly safe. NOTE: .env.example is deliberately NOT
# path-allowlisted — its placeholder values are excluded by the per-rule
# allowlists above, so a real secret accidentally placed there is still caught.
paths = [
  '''keycloak/REALM-EXPORT-NOTES\.md''',
  '''keycloak/PINNED-VERSION\.md''',
  '''README\.md''',
  # .gitleaksignore — stores fingerprint IDs of known false positives.
  # Excluding it prevents gitleaks from matching its own fingerprint content.
  '''\.gitleaksignore''',
  # BMad / Claude Code tooling directories — vendored framework files and
  # documentation that contain illustrative example API keys (not real
  # project secrets). Out of scope for this repo's secret hygiene.
  '''^\.claude/''',
  '''^_bmad/''',
  '''^_bmad-output/''',
  # BATS test files — they contain illustrative example secret patterns
  # (e.g. the AC1-RC-13 "KC_DB_PASSWORD: realpass" comment and the AC2-15
  # fixture) on purpose. Real secrets still can't live here meaningfully.
  '''^tests/''',
]
