# CI Pipeline — envocc-sso
# Story 1.1: Gitleaks secret-scanning gate (grows in subsequent stories)
#
# Subsequent stories will add:
#   - Docker Compose smoke test (Keycloak health, realm import)
#   - RSpec test suite (Story 3.1)
#   - Brakeman static analysis (Story 3.1)
#   - BATS integration tests (Stories 1.2+)

name: CI

on:
  push:
    branches: ["main", "develop", "story-*"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # ─── Secret Scanning Gate ──────────────────────────────────────────────────
  # Blocks the build if any secret pattern is detected in the source tree.
  # This is a hard gate — a match means the PR/push cannot merge.
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan all commits
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use our custom config (includes Keycloak-specific rules + allowlist)
          GITLEAKS_CONFIG: .gitleaks.toml
          # Redact actual secret values from logs
          GITLEAKS_ENABLE_COMMENTS: "true"

  # ─── Realm Export Secret Check ─────────────────────────────────────────────
  # Extra targeted check: confirm the committed realm export contains no secrets.
  realm-export-check:
    name: Realm Export Clean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.0"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Verify realm-export.json has no secrets
        run: |
          if [ -f keycloak/realm-export.json ]; then
            gitleaks detect \
              --source keycloak/realm-export.json \
              --config .gitleaks.toml \
              --redact \
              --verbose
            echo "realm-export.json passed secret scan — safe to commit."
          else
            echo "keycloak/realm-export.json not found — skipping realm check."
          fi
