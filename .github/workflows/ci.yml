# CI Pipeline — envocc-sso
# Story 1.1: Gitleaks secret-scanning gate
# Story 1.5: Full agentic-build / CI security gate
#
# Jobs added in Story 1.5:
#   - sast          — Semgrep SAST (always runs; SARIF artifact uploaded)
#   - realm-lint    — Python realm-export.json structure + key-material check
#   - format-check  — Prettier (skipped until admin/package.json exists)
#   - dependency-audit — bun audit (skipped until admin/package.json exists)
#   - language-checks  — ESLint + tsc + svelte-check (skipped until admin/package.json exists)
#
# Admin-app jobs (format-check, dependency-audit, language-checks) depend on admin-app-check,
# which detects whether admin/package.json exists and exposes an `exists` output. The guard:
#   if: needs.admin-app-check.result == 'success' && needs.admin-app-check.outputs.exists == 'true'
# ensures jobs are skipped now and activate automatically when Story 4.1 lands, while also
# preventing a silent bypass if admin-app-check itself errors (result != 'success').

name: CI

on:
  push:
    branches: ["main", "story-*", "epic-*"]
  pull_request:
    branches: ["main", "epic-*", "story-*"]

# Single source of truth for the gitleaks version used by all jobs.
# Bump here to upgrade both the secret-scan gate and the realm-export check.
# Also update GITLEAKS_SHA256 to match the new linux_x64 release tarball.
env:
  GITLEAKS_VERSION: "8.24.0"
  # SHA-256 of gitleaks_8.24.0_linux_x64.tar.gz (from official checksums.txt).
  # Update this when bumping GITLEAKS_VERSION to prevent supply-chain tampering.
  GITLEAKS_SHA256: "cb49b7de5ee986510fe8666ca0273a6cc15eb82571f2f14832c9e8920751f3a4"

jobs:

  # ─── Secret Scanning Gate ──────────────────────────────────────────────────
  # Blocks the build if any secret pattern is detected in the source tree.
  # This is a hard gate — a match means the PR/push cannot merge.
  #
  # We invoke the gitleaks BINARY directly rather than gitleaks/gitleaks-action@v2:
  # the v2 action requires a paid GITLEAKS_LICENSE for organization-owned repos
  # (it exits non-zero without one), which would make the gate fail for the wrong
  # reason. The binary needs no license and lets us pass --redact explicitly.
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan commits (not just the working tree).
          # NOTE: use `gitleaks detect` (without --no-git) below to actually scan history.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "$tmp/gitleaks.tar.gz"
          # Verify checksum before installing — guards against MITM / CDN compromise.
          echo "${GITLEAKS_SHA256}  $tmp/gitleaks.tar.gz" | sha256sum --check --status
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
          sudo install -m 0755 "$tmp/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (working tree + git history)
        run: |
          # Scan the working tree AND git commit history.
          # --no-git is intentionally omitted so gitleaks walks git history (enabled by fetch-depth: 0 above).
          # --redact keeps any matched secret value out of the CI logs.
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  # ─── Realm Export Secret Check ─────────────────────────────────────────────
  # Extra targeted check: confirm the committed realm export contains no secrets.
  realm-export-check:
    name: Realm Export Clean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "$tmp/gitleaks.tar.gz"
          # Verify checksum before installing — guards against MITM / CDN compromise.
          echo "${GITLEAKS_SHA256}  $tmp/gitleaks.tar.gz" | sha256sum --check --status
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
          sudo install -m 0755 "$tmp/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      - name: Verify realm-export.json has no secrets
        run: |
          gitleaks detect \
            --source keycloak/realm-export.json \
            --no-git \
            --config .gitleaks.toml \
            --redact \
            --verbose
          echo "realm-export.json passed secret scan — safe to commit."

  # ─── Realm Config Lint ─────────────────────────────────────────────────────
  # Validates realm-export.json structure and checks for embedded key material.
  # Complements the gitleaks secret scan with semantic field-level validation.
  realm-lint:
    name: Realm Config Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Lint realm-export.json
        run: python3 scripts/lint-realm-export.py

  # ─── SAST (Semgrep) ────────────────────────────────────────────────────────
  # Static application security testing — detects security antipatterns in source.
  # Runs on the full repository; SARIF report uploaded as artifact for GitHub
  # Security tab ingestion.
  # --config auto uses the Semgrep OSS registry (no account/token required).
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload SARIF to the GitHub Security tab
      contents: read          # required for actions/checkout; job-level permissions
                              # zero out all unspecified scopes, so this must be explicit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: semgrep scan --config auto --error --sarif --output semgrep.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        # always() ensures upload runs even when --error causes semgrep to exit non-zero
        # (violations found). The hashFiles guard prevents a misleading "file not found"
        # failure when semgrep crashes before writing the SARIF file (e.g. network error).
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  # ─── Admin-App Presence Check ──────────────────────────────────────────────
  # Detects whether the admin SvelteKit app exists yet.
  # hashFiles() is not available at the job-level if: context; use a shell test
  # inside a lightweight job and expose the result as an output instead.
  # Format-check, dependency-audit, and language-checks depend on this output.
  admin-app-check:
    name: Admin App Presence Check
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for admin/package.json
        id: check
        run: |
          if [ -f admin/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Format Check (Prettier) ───────────────────────────────────────────────
  # Runs Prettier over the admin app source files.
  # Guarded: skipped entirely until admin/package.json exists (Story 4.1).
  # No forward dependency — activates automatically when the admin app lands.
  format-check:
    name: Format Check (Prettier)
    runs-on: ubuntu-latest
    needs: admin-app-check
    # result == 'success' is a defensive guard: it ensures this job only runs when
    # admin-app-check fully completed, preventing the edge case where a stale or
    # unexpected output value could trigger a run after a partial failure.
    # Note: a failed admin-app-check still causes this job to be SKIPPED (not failed).
    # Configure branch-protection required checks to block merges on skipped jobs.
    if: needs.admin-app-check.result == 'success' && needs.admin-app-check.outputs.exists == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd admin && bun install --frozen-lockfile

      - name: Run Prettier check
        run: cd admin && bunx prettier --check "**/*.{ts,svelte,js,json,css,md}"

  # ─── Dependency Audit ──────────────────────────────────────────────────────
  # Audits admin app npm/bun dependencies for known CVEs.
  # Guarded: skipped entirely until admin/package.json exists (Story 4.1).
  dependency-audit:
    name: Dependency Audit (bun)
    runs-on: ubuntu-latest
    needs: admin-app-check
    if: needs.admin-app-check.result == 'success' && needs.admin-app-check.outputs.exists == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd admin && bun install --frozen-lockfile

      - name: Run bun audit
        run: cd admin && bun audit

  # ─── Language Checks (ESLint + tsc + svelte-check) ─────────────────────────
  # Type-checks and lints the admin SvelteKit app.
  # Guarded: skipped entirely until admin/package.json exists (Story 4.1).
  language-checks:
    name: Language Checks (ESLint + tsc + svelte-check)
    runs-on: ubuntu-latest
    needs: admin-app-check
    if: needs.admin-app-check.result == 'success' && needs.admin-app-check.outputs.exists == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd admin && bun install --frozen-lockfile

      - name: Run ESLint
        run: cd admin && bunx eslint .

      - name: Run TypeScript type check
        run: cd admin && bunx tsc --noEmit

      - name: Run svelte-check
        run: cd admin && bunx svelte-check
