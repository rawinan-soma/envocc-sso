# nginx/nginx.conf — envocc-sso security edge
#
# Role: TLS termination, security headers, CSP, rate-limiting, reverse proxy to Keycloak
#
# Architecture:
#   - All external traffic enters on port 443 (HTTPS) or port 80 (HTTP → HTTPS redirect)
#   - Keycloak listens internally on port 8080 (HTTP-only, no external exposure)
#   - Management port 9000 (Keycloak health) is NOT proxied — internal only
#
# Story: 1.3 — Nginx security edge
# References: architecture.md#Decision 3; PRD NFR4, FR50, FR12

# ─── Global / event ─────────────────────────────────────────────────────────

worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

# ─── HTTP block ─────────────────────────────────────────────────────────────

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Rate-limiting zones (AC3) ────────────────────────────────────────────
    # Per-IP rate limits for public unauthenticated authentication endpoints.
    # These supplement Keycloak's own brute-force protection (Story 1.2).
    #
    # login_zone: login page, registration, password reset, token (10 req/min, burst=20).
    # All auth surfaces (/realms/, /auth/, /admin/) share this zone. The token
    # endpoint lives under /realms/ and is therefore throttled by login_zone — the
    # stricter 10r/m budget is intentional brute-force protection.
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

    # Return 429 Too Many Requests (not the default 503 Service Unavailable) when rate-limited
    limit_req_status 429;

    # ── Proxy buffer settings (for Keycloak which can be slow on first login) ─
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    proxy_connect_timeout      60s;
    proxy_send_timeout         60s;
    proxy_read_timeout         120s;

    # ── HTTP → HTTPS redirect (port 80) ─────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        # Standard security headers on the redirect too, so AC1's "any request
        # arriving at the Nginx listener" holds even for the plain-HTTP 301
        # (HSTS on a plaintext response is ignored by browsers, but the other
        # headers are cheap and the spec emphasises `always`).
        add_header X-Frame-Options            "DENY"                               always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;

        # Redirect ALL plain-HTTP requests to HTTPS (AC1)
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server (port 443) ──────────────────────────────────────────────
    server {
        listen       443 ssl;
        server_name  _;

        # ── TLS configuration (AC1) ─────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;

        # Only TLSv1.2 and TLSv1.3 — TLS 1.0 and 1.1 are disabled (AC1)
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Edge liveness probe (AC5) ────────────────────────────────────────
        # Local, Keycloak-independent health endpoint. The compose healthcheck
        # targets this so Nginx's reported health reflects Nginx's own liveness,
        # not Keycloak's upstream status (proxying `/` would mark Nginx unhealthy
        # whenever Keycloak returns 4xx/5xx).
        location = /healthz {
            access_log off;
            add_header Content-Type "text/plain" always;
            return 200 "ok\n";
        }

        # ── Default location — proxy to Keycloak ────────────────────────────
        # All traffic is proxied to Keycloak on the internal Docker network.
        # IMPORTANT: add_header directives in this location block override
        # (do NOT inherit) any add_header from a parent block. All required
        # security headers are set explicitly in every location block.
        location / {
            proxy_pass         http://keycloak:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Standard security headers — AC1
            # (repeated in every location block due to nginx add_header inheritance rules)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options            "DENY"                               always;
            add_header X-Content-Type-Options     "nosniff"                            always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
        }

        # ── Auth surfaces — Keycloak realms / auth paths ─────────────────────
        # These location blocks match Keycloak authentication endpoints.
        # They add Content-Security-Policy: frame-ancestors 'none' (AC2, NFR4/FR12)
        # AND apply rate-limiting (AC3).
        #
        # NGINX add_header inheritance rule: when a location block defines any
        # add_header directive, it does NOT inherit add_header from parent blocks.
        # All standard security headers are therefore repeated here explicitly.
        #
        # JWKS / OIDC discovery: these paths (certs, openid-configuration) are
        # included here. We do NOT add a Cache-Control header — Keycloak sets its
        # own Cache-Control, and we preserve it. (AC4)

        # NOTE: The regexes below use `^/realms(/|$)` and `^/auth(/|$)` to match both
        # the bare path (e.g. /realms) and any sub-path (e.g. /realms/master/...).
        # Without the `(/|$)` alternation, a bare `/realms` (no trailing slash) would
        # fall through to `location /`, missing CSP and rate-limiting (AC2, AC3).

        location ~ ^/realms(/|$) {
            # Rate-limiting for login and token endpoints under /realms/ (AC3)
            limit_req zone=login_zone burst=20 nodelay;

            proxy_pass         http://keycloak:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Standard security headers (AC1) — repeated because of add_header inheritance
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
            add_header X-Frame-Options            "DENY"                                   always;
            add_header X-Content-Type-Options     "nosniff"                                always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
            # CSP: anti-phishing control — frame-ancestors 'none' on all auth surfaces (AC2)
            add_header Content-Security-Policy    "frame-ancestors 'none'"                 always;
            # NOTE: No Cache-Control add_header here — Keycloak's Cache-Control is preserved (AC4)
        }

        location ~ ^/auth(/|$) {
            # Rate-limiting for legacy /auth/ path (AC3)
            limit_req zone=login_zone burst=20 nodelay;

            proxy_pass         http://keycloak:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Standard security headers (AC1) — repeated because of add_header inheritance
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
            add_header X-Frame-Options            "DENY"                                   always;
            add_header X-Content-Type-Options     "nosniff"                                always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
            # CSP: anti-phishing control — frame-ancestors 'none' on all auth surfaces (AC2)
            add_header Content-Security-Policy    "frame-ancestors 'none'"                 always;
        }

        # ── Admin console — Keycloak administration UI (AC2) ─────────────────
        # The admin console is served under /admin/ (NOT under /realms/ or
        # /auth/), so it needs its own location block to receive CSP
        # frame-ancestors 'none'. AC2 names "admin" as an auth surface, and the
        # README directs administrators to https://localhost/admin/. Without this
        # block, /admin/ would fall through to `location /` and ship without CSP —
        # leaving the highest-value clickjacking target unprotected.
        location ~ ^/admin(/|$) {
            # Rate-limiting for the admin console login (AC3)
            limit_req zone=login_zone burst=20 nodelay;

            proxy_pass         http://keycloak:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Standard security headers (AC1) — repeated because of add_header inheritance
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
            add_header X-Frame-Options            "DENY"                                   always;
            add_header X-Content-Type-Options     "nosniff"                                always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
            add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
            # CSP: anti-phishing control — frame-ancestors 'none' on all auth surfaces (AC2)
            add_header Content-Security-Policy    "frame-ancestors 'none'"                 always;
        }
    }
}
