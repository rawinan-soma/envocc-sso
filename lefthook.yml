# lefthook.yml — pre-commit agentic-build gate
# Story 1.5: Agentic-build / CI Security Gate
#
# Run `lefthook install` once after cloning to register the Git hook.
# Required tools: gitleaks (8.24.0+), semgrep, python3
#
# Each command exits non-zero on violation; lefthook blocks the commit if any fail.

pre-commit:
  commands:
    secret-scan:
      name: Secret Scan (gitleaks)
      run: gitleaks protect --staged --redact --config .gitleaks.toml

    sast:
      name: SAST (Semgrep)
      # Unset REQUESTS_CA_BUNDLE before invoking semgrep so it uses its bundled
      # certifi CA rather than any stale machine-level override (e.g. a slim-bundle.pem
      # path that no longer exists). Setting it to "" would leave the variable set
      # (empty path), which some requests versions treat as a CA file path and raise
      # an SSLError. Unsetting it entirely is the safe default.
      run: env -u REQUESTS_CA_BUNDLE semgrep scan --config auto --error

    realm-lint:
      name: Realm Config Lint
      run: python3 scripts/lint-realm-export.py
