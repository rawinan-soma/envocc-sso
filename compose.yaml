# compose.yaml — envocc-sso foundation stack
#
# Services:
#   postgres           — PostgreSQL 17.5, two isolated databases (keycloak + admin)
#   keycloak           — Keycloak 26.6.3, backed by the keycloak database
#   nginx              — Nginx 1.28-alpine, security edge (TLS, headers, rate-limiting)
#   mock-oidc-provider — (Story 2.9, dev/CI ONLY) simulates the external ThaiD OIDC
#                        identity provider for the "Login with ThaiD" brokered-login
#                        integration tests. No access to the real DOPA/ThaiD service
#                        exists in dev/CI (AC5). See "PRODUCTION-HARDENING NOTE" on
#                        this service below and keycloak/REALM-EXPORT-NOTES.md.
#
# Prerequisites:
#   1. Generate TLS certs: openssl req -x509 -newkey rsa:4096 -keyout nginx/certs/dev.key -out nginx/certs/dev.crt -days 365 -nodes -subj "/CN=localhost"
#   2. Copy .env.example → .env
#   3. Fill in all `change-me-*` placeholder values
#   4. docker compose up --build
#
# Secrets: ALL credentials come from .env — no hard-coded values here.
# Version pinning: all images pinned by exact tag AND @sha256: digest.
#
# SECURITY NOTE (Story 1.3): Nginx is the ONLY external entry point (ports 80, 443).
# Keycloak port 8080 is intentionally NOT published to the host — all traffic
# must pass through Nginx for TLS termination, security headers, CSP, and rate-limiting.

services:

  # ── PostgreSQL 17.5 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:17.5@sha256:aadf2c0696f5ef357aa7a68da995137f0cf17bad0bf6e1f17de06ae5c769b302
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Pin the default database to `postgres` so the image does not create a
      # stray database named after POSTGRES_USER. The two real databases
      # (keycloak, admin) are created by the init script below.
      POSTGRES_DB: postgres
      # Pass role credentials to the init script
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      ADMINAPP_DB_USERNAME: ${ADMINAPP_DB_USERNAME}
      ADMINAPP_DB_PASSWORD: ${ADMINAPP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Keycloak 26.6.3 ────────────────────────────────────────────────────────
  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    restart: unless-stopped
    # Explicit environment block — only the vars KC actually needs:
    # the 6 DB/bootstrap credentials plus 2 HTTP/hostname settings for the
    # local HTTP-only stack. Do NOT use env_file: .env here: that would leak
    # the Postgres superuser password and admin-app DB credentials into the
    # KC process env.
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      # Required for HTTP-only local stack — Keycloak receives HTTP from Nginx internally
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Trust X-Forwarded-* headers from Nginx reverse proxy (Story 1.3).
      # Without this, Keycloak uses internal HTTP addresses in redirect URIs and
      # OIDC discovery — causing redirect URI mismatches in OAuth2/OIDC flows.
      KC_PROXY_HEADERS: xforwarded
    # NOTE: Port 8080 is intentionally NOT published to the host (Story 1.3).
    # Nginx is the only external entry point (ports 80/443). Exposing 8080 would
    # bypass TLS termination, security headers, CSP, and rate-limiting.
    # Port 9000 (management/health) is intentionally NOT published to host.
    # It is used in-container for the healthcheck below only.
    depends_on:
      postgres:
        condition: service_healthy
      # Story 2.9 — dev/CI convenience only: Keycloak's realm import references the
      # `thaid` identity provider's mock endpoints (keycloak/realm-export.json), so
      # the mock IdP should be up before Keycloak's own healthcheck is relied upon by
      # dependents. A production-hardening pass MUST remove this dependency entirely
      # (along with the mock-oidc-provider service itself) once the `thaid` IdP is
      # repointed at the real DOPA/ThaiD endpoints — mirrors the `test-ropc-client`
      # "FORBIDDEN in production" pattern from Story 2.1/2.8.
      mock-oidc-provider:
        condition: service_healthy
    healthcheck:
      # Health endpoint moved to management port 9000 in KC 25+.
      # The ubi9-micro base image has no curl/wget — use a bash TCP socket.
      # /dev/tcp is a bash builtin, so invoke bash explicitly (CMD-SHELL would
      # run /bin/sh, which is not guaranteed to support /dev/tcp).
      # Assert: HTTP 200 status line (reason phrase optional per RFC 7230)
      #         AND "status": "UP" (KC 26 JSON format)
      #         AND absence of "status": "DOWN".
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          exec 3<>/dev/tcp/localhost/9000 &&
          printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          out=$$(cat <&3) &&
          exec 3>&- &&
          echo "$$out" | grep -Eq '^HTTP/[0-9.]+ 200( |$$|\r)' &&
          echo "$$out" | grep -q '"status": "UP"' &&
          ! echo "$$out" | grep -q '"status": "DOWN"'
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Mock OIDC IdP (Story 2.9, dev/CI ONLY) ──────────────────────────────────
  # ghcr.io/navikt/mock-oauth2-server: MIT-licensed, actively maintained, purpose-
  # built for mocking OAuth2/OIDC providers. Simulates the external ThaiD identity
  # provider so the "Login with ThaiD" brokered-login flow can be exercised in
  # dev/CI without any dependency on the real DOPA/ThaiD service (AC5).
  #
  # Configuration: JSON_CONFIG_PATH points at a mounted config file that enables
  # `interactiveLogin` (a simple HTML login form at the authorize endpoint whose
  # submitted `username` field becomes the issued token's `sub` claim — this is how
  # integration tests assert an arbitrary PID per test user). The image supports
  # multiple issuers with ZERO configuration: the first path segment of any request
  # URL is taken as the issuer id, so this realm always addresses it under a single
  # path, "thaid" (e.g. /thaid/.well-known/openid-configuration), without needing an
  # explicit issuer registration. See keycloak/mock-oidc/config.json and
  # keycloak/REALM-EXPORT-NOTES.md (Story 2.9 section) for the full mechanism,
  # including why the `thaid` identity provider's `authorizationUrl` (browser-facing)
  # deliberately differs from its `tokenUrl`/`userInfoUrl`/`jwksUrl`/`issuer`
  # (Keycloak-backend-facing, reached via this service's Compose DNS name).
  #
  # PRODUCTION-HARDENING NOTE: this service exists ONLY to support dev/CI's mock
  # ThaiD broker flow. A production compose file would omit it entirely and point
  # the `thaid` identity provider at the real DOPA/ThaiD endpoints instead.
  mock-oidc-provider:
    image: ghcr.io/navikt/mock-oauth2-server:5.0.2@sha256:f625692f5bf84939f3d0af4931f2c0f038dca84c4f1bac1171710d544181f97f
    restart: unless-stopped
    environment:
      JSON_CONFIG_PATH: /config/config.json
    volumes:
      - ./keycloak/mock-oidc/config.json:/config/config.json:ro
    # Host port published — unlike Keycloak's own 8080 (see SECURITY NOTE above),
    # this dev/CI-only mock IdP needs host reachability for two reasons: (1) the
    # BATS-driven integration suite (tests/integration/thaid-broker.bats, TS-290a)
    # runs as a host process and curls this service's discovery endpoint directly;
    # (2) the `thaid` identity provider's `authorizationUrl` in realm-export.json
    # points browsers here directly (Keycloak only ever redirects the browser to
    # this URL — it never calls it server-to-server), and in dev/CI the "browser"
    # (a real browser, or this repo's BATS helper acting as one) runs on the host,
    # not inside the Docker network. This does not contradict Story 1.3's "only
    # Nginx publishes ports" rule in practice — that rule is already not strictly
    # followed today: every existing integration test calls Keycloak directly at
    # http://localhost:8080, a pre-existing environment assumption from prior
    # stories that this story does not introduce or attempt to silently fix.
    ports:
      - "18080:8080"
    healthcheck:
      # The Wolfi-based image ships wget but no curl (confirmed at implementation
      # time). GET /isalive returns 200 "alive and well" once ready.
      #
      # Code review note: switching this to poll the `thaid` issuer's own
      # discovery endpoint (Task 0.2's literal suggestion) was tried and
      # reverted — hands-on verification found the per-issuer discovery route
      # (`/thaid/.well-known/openid-configuration`) is not reliably ready in
      # the same window /isalive is, causing spurious `unhealthy` status and
      # blocking Keycloak's `depends_on: service_healthy` gate from ever
      # passing. /isalive remains the healthcheck; TS-290a in
      # tests/integration/thaid-broker.bats independently and directly
      # verifies the `thaid` discovery endpoint as this suite's first test,
      # so discovery-readiness is still covered, just not at the compose
      # healthcheck layer.
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/isalive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Nginx 1.28-alpine ─────────────────────────────────────────────────────
  # Security edge: TLS termination, security headers, CSP, rate-limiting.
  # ALL external traffic must route through Nginx (ports 80/443).
  # Keycloak is reachable internally at http://keycloak:8080 only.
  nginx:
    image: nginx:1.28-alpine@sha256:a8b39bd9cf0f83869a2162827a0caf6137ddf759d50a171451b335cecc87d236
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP → HTTPS redirect
      - "443:443"  # HTTPS (TLS-terminated at this edge)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      # Target the local /healthz endpoint (NOT /) so Nginx health reflects its
      # own liveness, not Keycloak's upstream status — proxying / would mark
      # Nginx unhealthy whenever Keycloak returns 4xx/5xx.
      # nginx:alpine includes curl; -k bypasses self-signed cert; -sf fails on HTTP error
      test: ["CMD", "curl", "-k", "-sf", "https://localhost/healthz", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
